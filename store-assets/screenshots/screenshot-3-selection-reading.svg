<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbfdf8"/>
      <stop offset="1" stop-color="#edf6f1"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f8f81"/>
      <stop offset="1" stop-color="#c79025"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1f3652" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect x="142" y="58" width="996" height="660" rx="22" fill="#ffffff" filter="url(#shadow)"/>

  <g transform="translate(300 138)">
    <text x="0" y="0" fill="#1d2a32" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">选中文字后从这里开始听读</text>
    <text x="0" y="44" fill="#87939a" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16">公众号文章正文</text>

    <rect x="0" y="92" width="610" height="14" rx="7" fill="#dfe9e3"/>
    <rect x="0" y="128" width="568" height="14" rx="7" fill="#dfe9e3"/>
    <rect x="0" y="164" width="632" height="14" rx="7" fill="#dfe9e3"/>

    <rect x="-10" y="214" width="622" height="38" rx="9" fill="#d9ecff"/>
    <text x="0" y="239" fill="#1d2a32" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="600">选中正文中的一句或一段，旁边会出现“从这里读”。</text>

    <rect x="0" y="292" width="596" height="14" rx="7" fill="#dfe9e3"/>
    <rect x="0" y="328" width="514" height="14" rx="7" fill="#dfe9e3"/>
    <rect x="0" y="364" width="574" height="14" rx="7" fill="#dfe9e3"/>

    <g transform="translate(628 202)" filter="url(#shadow)">
      <rect width="166" height="44" rx="12" fill="#ffffff"/>
      <rect x="8" y="8" width="86" height="28" rx="9" fill="url(#brand)"/>
      <path d="M23 16L34 22L23 28Z" fill="#ffffff"/>
      <text x="42" y="27" fill="#ffffff" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="700">从这里读</text>
      <rect x="102" y="8" width="56" height="28" rx="8" fill="#f8fbf8" stroke="#dce6e0"/>
      <text x="112" y="27" fill="#24313a" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12">1.25x</text>
    </g>
  </g>

  <g transform="translate(215 632)" filter="url(#shadow)">
    <rect width="850" height="92" rx="16" fill="#ffffff" opacity="0.97"/>
    <rect x="0" y="16" width="4" height="60" rx="2" fill="url(#brand)"/>
    <text x="28" y="30" fill="#247b70" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="700">公众号听读</text>
    <text x="28" y="56" fill="#1d2a32" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700">定位到当前句</text>

    <rect x="342" y="24" width="36" height="36" rx="9" fill="#f8fbf8" stroke="#dce6e0"/>
    <text x="355" y="48" fill="#24313a" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">‹</text>
    <rect x="388" y="24" width="82" height="36" rx="10" fill="url(#brand)"/>
    <text x="414" y="47" fill="#ffffff" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="700">暂停</text>
    <rect x="480" y="24" width="36" height="36" rx="9" fill="#f8fbf8" stroke="#dce6e0"/>
    <text x="493" y="48" fill="#24313a" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">›</text>

    <rect x="28" y="72" width="498" height="7" rx="3.5" fill="#e7eee9"/>
    <rect x="28" y="72" width="156" height="7" rx="3.5" fill="#2f8f81"/>
    <circle cx="184" cy="75.5" r="9" fill="#2f8f81" stroke="#ffffff" stroke-width="3"/>
    <text x="690" y="80" fill="#63717a" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13">12 / 54  正在朗读</text>
  </g>
</svg>
